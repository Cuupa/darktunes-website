openapi: 3.1.0
info:
  title: darkTunes Music Group API
  description: |
    REST API for the darkTunes Music Group website (Next.js 15 App Router).

    **Authentication**
    - `SessionBearer`: Supabase JWT for authenticated users (portal, account, press).
    - `AdminBearer`: Supabase JWT with `admin` or `editor` role (admin routes).
    - `CronSecret`: Bearer token matching `CRON_SECRET` for scheduled sync/cache jobs.

    **Error format** (all routes via `withErrorHandler`):
    ```json
    { "error": "Human-readable message", "code": "OPTIONAL_ERROR_CODE" }
    ```
  version: 1.0.0
  contact:
    name: darkTunes Music Group
    url: https://darktunes.com

servers:
  - url: https://darktunes.com
    description: Production
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Account
    description: "Authenticated user account management (GDPR export, display name, deletion)."
  - name: Admin
    description: CMS and back-office endpoints (admin or editor role required).
  - name: Auth
    description: Public authentication helpers.
  - name: Cache
    description: On-demand ISR cache revalidation (secret-protected).
  - name: EPK
    description: Electronic press kit sharing and export.
  - name: Health
    description: System health probes and alerting.
  - name: Journalist Applications
    description: Press accreditation application flow.
  - name: Newsletter
    description: Double opt-in newsletter subscription.
  - name: Portal
    description: Artist portal dashboard APIs.
  - name: Press
    description: Journalist/press dashboard APIs.
  - name: Public
    description: Unauthenticated public endpoints.
  - name: Sync
    description: Artist/release sync jobs (cron or admin triggered).
  - name: Upload
    description: Media upload endpoints.

components:
  securitySchemes:
    SessionBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase access token (portal artist, press journalist, account owner).
    AdminBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase access token with admin or editor role.
    CronSecret:
      type: http
      scheme: bearer
      description: Static secret from CRON_SECRET env var (Supabase Cron / internal jobs).

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
    ContactRequest:
      type: object
      required: [name, email, topic, message, gdprConsent]
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string, format: email }
        topic: { type: string, minLength: 1, maxLength: 100 }
        message: { type: string, minLength: 20 }
        gdprConsent: { type: boolean, enum: [true] }
        website: { type: string, maxLength: 0, description: "Honeypot field - must be empty" }
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
    NewsletterSubscribeRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
    DisplayNameUpdate:
      type: object
      required: [displayName]
      properties:
        displayName: { type: string, minLength: 1, maxLength: 120 }
    HealthLiveness:
      type: object
      properties:
        status: { type: string, enum: [ok, degraded] }
        database:
          type: object
          properties:
            status: { type: string, enum: [online, offline] }

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Forbidden:
      description: Insufficient role or permission
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

