name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 09:00 UTC to catch newly published vulnerabilities
    - cron: '0 9 * * 1'

jobs:
  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        # Fail on moderate or higher severity vulnerabilities in production dependencies.
        # Dev-only tool transitive deps (e.g. @lhci/cli → tmp) are excluded because
        # patched versions of those packages do not exist in the npm registry.
        run: npm audit --omit=dev --audit-level=moderate
