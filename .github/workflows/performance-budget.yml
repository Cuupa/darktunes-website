name: Performance Budget

on:
  pull_request:
    paths:
      - 'src/**'
      - 'app/**'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'app/**'
      - 'package.json'

jobs:
  bundle-budget:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Enforce bundle budget
        run: node scripts/check-bundle-budget.js
